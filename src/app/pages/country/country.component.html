@if (countryDatas$ | async; as countryDatas) {
  <!-- Loading -->
  @if (countryDatas.state === 'loading') {
    <div class="page-content">
      <app-spinner></app-spinner>
    </div>
  }

  <!-- Error -->
  @if (countryDatas.state === 'error') {
    <div class="page-content">
      <app-header title="Error"></app-header>
      <p>{{ countryDatas.error }}</p>
      <app-back [link]="['']" text="Go back"></app-back>
    </div>
  }

  <!-- Empty -->
  @if (countryDatas.state === 'empty') {
    <div class="page-content">
      <app-header title="Aucune Donnée"></app-header>
      <app-back [link]="['']" text="Go back"></app-back>
    </div>
  }

  <!-- Loaded-->
  @if (countryDatas.state === 'loaded') {
    <div class="page-content">
      <app-header [title]="countryDatas.titlePage" [dataCards]="countryDatas.dataCards"></app-header>
      <app-chart-container [type]="'line'" [labels]="countryDatas.chartData.labels" [values]="countryDatas.chartData.values" legend="Medals Over Years"></app-chart-container>
      <app-back text="Go back"></app-back>
    </div>
  }
}
